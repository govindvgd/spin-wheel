<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin Wheel - Himanshi (Super Girl)</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            color: white;
            height: 100vh;
            width: 100vw;
        }

        /* HEADER */
        .header {
            padding: 15px 20px;
            text-align: center;
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: rgba(255, 255, 255, 0.8);
            font-weight: 300;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            gap: 20px;
            padding: 20px;
            overflow: hidden;
        }

        /* WHEEL CONTAINER */
        .wheel-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: auto;
            max-width: 500px;
            aspect-ratio: 1 / 1;
        }

        canvas {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.3));
            border-radius: 50%;
        }

        /* BUTTONS */
        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        button {
            padding: clamp(10px, 2vw, 15px) clamp(20px, 4vw, 30px);
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-spin {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-spin:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
        }

        .btn-spin:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-fullscreen {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-fullscreen:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.4);
        }

        /* RESULT */
        .result-box {
            text-align: center;
            min-height: 40px;
            font-size: clamp(1rem, 3vw, 1.3rem);
            font-weight: 600;
            color: #ffd700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* FOOTER */
        footer {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            font-size: clamp(0.75rem, 1.5vw, 0.9rem);
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        footer span {
            display: inline-block;
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        footer span:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        footer a {
            color: #ffd700;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: #ffed4e;
        }

        footer b {
            color: #ffd700;
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            .header {
                padding: 12px 15px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .main-content {
                padding: 15px;
                gap: 15px;
            }

            .wheel-wrapper {
                max-width: 350px;
            }

            .button-group {
                gap: 10px;
            }

            button {
                padding: 12px 24px;
                font-size: 0.95rem;
            }

            footer {
                padding: 12px 15px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            body {
                justify-content: space-between;
            }

            .header {
                padding: 10px;
            }

            .header h1 {
                font-size: 1.5rem;
                margin-bottom: 3px;
            }

            .header p {
                font-size: 0.8rem;
            }

            .main-content {
                padding: 10px;
                gap: 12px;
            }

            .wheel-wrapper {
                max-width: 280px;
            }

            .button-group {
                gap: 8px;
            }

            button {
                padding: 10px 20px;
                font-size: 0.85rem;
            }

            .result-box {
                font-size: 1rem;
                min-height: 35px;
            }

            footer {
                padding: 10px;
                font-size: 0.75rem;
                gap: 8px;
            }

            footer span {
                padding: 4px 10px;
                font-size: 0.7rem;
            }
        }

        :-webkit-full-screen .main-content {
            padding: 40px;
        }

        :fullscreen .main-content {
            padding: 40px;
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <h1>🎡 SPIN THE WHEEL</h1>
        <p>✨ Test Your Skills & Luck ✨</p>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <!-- WHEEL -->
        <div class="wheel-wrapper">
            <canvas id="wheel" width="400" height="400"></canvas>
        </div>

        <!-- BUTTONS -->
        <div class="button-group">
            <button class="btn-spin" id="spinBtn" onclick="spin()">🎯 SPIN NOW</button>
            <button class="btn-fullscreen" onclick="goFullScreen()">⛶ FULL SCREEN</button>
        </div>

        <!-- RESULT -->
        <div class="result-box" id="result"></div>
    </div>

    <!-- FOOTER -->
    <footer>
        <span>👩‍💻 Created by <b>Himanshi (Super Girl)</b></span>
        <span>⚡ Powered by <a href="https://gowinthe-ai.tech" target="_blank">GoWinThe-ai.tech</a></span>
    </footer>

    <!-- WHEEL SCRIPT -->
    <script>
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");

        const segments = [
            "Sing a Brand Jingle 🎤",
            "Decode a Puzzle 🧩",
            "Crack a Guesstimate 📊",
            "Tongue Twister Showdown 👅",
            "Name 5 Careers in 30s ⏱️",
            "Decode a Recruiter Logo 🔍",
            "Network with a Stranger 🤝"
        ];

        const colors = [
            "#FF6B6B",
            "#4ECDC4",
            "#45B7D1",
            "#FFA07A",
            "#98D8C8",
            "#F7DC6F",
            "#BB8FCE"
        ];

        let angle = 0;
        let velocity = 0;
        let spinning = false;

        const arc = (2 * Math.PI) / segments.length;

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw segments
            for (let i = 0; i < segments.length; i++) {
                const start = angle + i * arc;
                const end = start + arc;

                // Segment
                ctx.beginPath();
                ctx.moveTo(200, 200);
                ctx.arc(200, 200, 180, start, end);
                ctx.lineTo(200, 200);
                ctx.fillStyle = colors[i];
                ctx.fill();

                // Border
                ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
                ctx.lineWidth = 2;
                ctx.stroke();

                // Text
                ctx.save();
                ctx.translate(200, 200);
                ctx.rotate(start + arc / 2);
                ctx.fillStyle = "white";
                ctx.font = "bold 13px Arial";
                ctx.textAlign = "right";
                ctx.fillText(segments[i], 150, 5);
                ctx.restore();
            }

            // Center circle
            ctx.beginPath();
            ctx.arc(200, 200, 40, 0, 2 * Math.PI);
            ctx.fillStyle = "white";
            ctx.fill();

            ctx.beginPath();
            ctx.arc(200, 200, 35, 0, 2 * Math.PI);
            ctx.fillStyle = "#667eea";
            ctx.fill();

            ctx.fillStyle = "white";
            ctx.font = "bold 16px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("SPIN", 200, 200);

            // Pointer
            ctx.fillStyle = "#ffd700";
            ctx.beginPath();
            ctx.moveTo(200, 20);
            ctx.lineTo(185, 50);
            ctx.lineTo(215, 50);
            ctx.fill();
            ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function update() {
            if (spinning) {
                angle += velocity;
                velocity *= 0.985;

                if (velocity < 0.002) {
                    spinning = false;
                    velocity = 0;
                    showResult();
                    spinBtn.disabled = false;
                }
            }

            drawWheel();
            requestAnimationFrame(update);
        }

        function spin() {
            if (!spinning) {
                velocity = Math.random() * 0.3 + 0.25;
                document.getElementById("result").innerText = "";
                spinning = true;
                spinBtn.disabled = true;
            }
        }

        function showResult() {
            const degrees = (angle * 180 / Math.PI + 90) % 360;
            const index = Math.floor((360 - degrees) / (360 / segments.length)) % segments.length;
            document.getElementById("result").innerText = "🎉 " + segments[index];
        }

        function goFullScreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen().catch(err => console.log(err));
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }

        // Start animation loop
        update();
    </script>
</body>
</html>
