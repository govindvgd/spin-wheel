<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin Wheel Pro</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #1f1f1f, #000);
  color: white;
  text-align: center;
}

/* MAIN CONTAINER */
.container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 20px;
  box-sizing: border-box;
}

/* TITLE */
h2 {
  margin-bottom: 10px;
  text-shadow: 0 0 10px rgba(255,215,0,0.5);
}

/* WHEEL */
canvas {
  display: block;
  margin: 10px auto;
  max-width: 90vw;
  height: auto;
  filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.4));
}

/* BUTTON GROUP */
.buttons {
  margin-top: 10px;
}

/* BUTTON */
button {
  padding: 12px 16px;
  margin: 6px;
  font-size: 14px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(145deg, gold, orange);
  color: black;
  font-weight: bold;
  box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
}

/* RESULT */
.result {
  margin-top: 10px;
  font-size: 16px;
  min-height: 22px;
}

/* FOOTER (NO OVERLAP NOW) */
.footer {
  margin-top: 30px;
  font-size: 13px;
  color: #aaa;
}

.footer span {
  display: inline-block;
  padding: 6px 10px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(5px);
}

.footer b {
  color: gold;
}

.footer a {
  color: gold;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

  <h2>🎡 Spin the Wheel</h2>

  <canvas id="wheel" width="320" height="320"></canvas>

  <div class="buttons">
    <button onclick="spin()">SPIN</button>
    <button onclick="goFullScreen()">FULL SCREEN</button>
  </div>

  <div class="result" id="result"></div>

  <!-- CLEAN FOOTER -->
  <div class="footer">
    <span>
      👩‍💻 Created by <b>Himanshi (Super Girl)</b> |
      ⚡ Powered by <a href="https://gowinthe-ai.tech" target="_blank">GoWinThe-ai.tech</a>
    </span>
  </div>

</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const segments = [
  "Sing a Brand Jingle 🎤",
  "Decode a Puzzle 🧩",
  "Crack a Guesstimate 📊",
  "Tongue Twister Showdown 👅",
  "Name 5 Careers in 30s ⏱️",
  "Decode a Recruiter Logo 🔍",
  "Network with a Stranger 🤝"
];

const colors = [
  "#00c3ff",
  "#ffcc00",
  "#33cc33",
  "#9933ff",
  "#ff3333",
  "#0066ff",
  "#ff8800"
];

let angle = 0;
let velocity = 0;
let spinning = false;

const arc = (2 * Math.PI) / segments.length;

function drawWheel() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < segments.length; i++) {
    const start = angle + i * arc;
    const end = start + arc;

    ctx.beginPath();
    ctx.moveTo(160, 160);
    ctx.arc(160, 160, 150, start, end);
    ctx.fillStyle = colors[i];
    ctx.fill();

    ctx.save();
    ctx.translate(160, 160);
    ctx.rotate(start + arc / 2);
    ctx.fillStyle = "white";
    ctx.font = "12px sans-serif";
    ctx.textAlign = "right";
    ctx.fillText(segments[i], 120, 5);
    ctx.restore();
  }

  // center
  ctx.beginPath();
  ctx.arc(160, 160, 30, 0, 2 * Math.PI);
  ctx.fillStyle = "gold";
  ctx.fill();

  // pointer
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.moveTo(160, 5);
  ctx.lineTo(145, 30);
  ctx.lineTo(175, 30);
  ctx.fill();
}

function update() {
  if (spinning) {
    angle += velocity;
    velocity *= 0.985;

    if (velocity < 0.002) {
      spinning = false;
      velocity = 0;
      showResult();
    }
  }

  drawWheel();
  requestAnimationFrame(update);
}

function spin() {
  if (!spinning) {
    velocity = Math.random() * 0.3 + 0.25;
    document.getElementById("result").innerText = "";
    spinning = true;
  }
}

function showResult() {
  const degrees = (angle * 180 / Math.PI + 90) % 360;
  const index = Math.floor((360 - degrees) / (360 / segments.length)) % segments.length;

  document.getElementById("result").innerText =
    "👉 " + segments[index];
}

function goFullScreen() {
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen();
  }
}

update();
</script>

</body>
</html>
