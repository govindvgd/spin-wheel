<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin Wheel</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #1a1a1a, #000);
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

.container {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
}

canvas {
  display: block;
  margin: auto;
}

button {
  padding: 12px 18px;
  margin: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background: gold;
  font-weight: bold;
}

.result {
  margin-top: 10px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🎡 Spin the Wheel</h2>
  <canvas id="wheel" width="320" height="320"></canvas>

  <div>
    <button onclick="spin()">SPIN</button>
    <button onclick="goFullScreen()">FULL SCREEN</button>
  </div>

  <div class="result" id="result"></div>
</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const segments = [
  "Sing a Brand Jingle 🎤",
  "Decode a Puzzle 🧩",
  "Crack a Guesstimate 📊",
  "Tongue Twister Showdown 👅",
  "Name 5 Careers in 30s ⏱️",
  "Decode a Recruiter Logo 🔍",
  "Network with a Stranger 🤝"
];

const colors = [
  "#00c3ff",
  "#ffcc00",
  "#33cc33",
  "#9933ff",
  "#ff3333",
  "#0066ff",
  "#ff8800"
];

let angle = 0;
let velocity = 0;
let spinning = false;

const arc = (2 * Math.PI) / segments.length;

function drawWheel() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < segments.length; i++) {
    const start = angle + i * arc;
    const end = start + arc;

    ctx.beginPath();
    ctx.moveTo(160, 160);
    ctx.arc(160, 160, 150, start, end);
    ctx.fillStyle = colors[i];
    ctx.fill();

    ctx.save();
    ctx.translate(160, 160);
    ctx.rotate(start + arc / 2);
    ctx.fillStyle = "white";
    ctx.font = "13px Arial";
    ctx.textAlign = "right";
    ctx.fillText(segments[i], 130, 5);
    ctx.restore();
  }

  // center
  ctx.beginPath();
  ctx.arc(160, 160, 30, 0, 2 * Math.PI);
  ctx.fillStyle = "gold";
  ctx.fill();

  // pointer
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.moveTo(160, 5);
  ctx.lineTo(145, 30);
  ctx.lineTo(175, 30);
  ctx.fill();
}

function update() {
  if (spinning) {
    angle += velocity;
    velocity *= 0.985;

    if (velocity < 0.002) {
      spinning = false;
      velocity = 0;
      showResult();
    }
  }

  drawWheel();
  requestAnimationFrame(update);
}

function spin() {
  if (!spinning) {
    velocity = Math.random() * 0.3 + 0.25;
    document.getElementById("result").innerText = "";
    spinning = true;
  }
}

function showResult() {
  const degrees = (angle * 180 / Math.PI + 90) % 360;
  const index = Math.floor((360 - degrees) / (360 / segments.length)) % segments.length;

  document.getElementById("result").innerText =
    "👉 " + segments[index];
}

function goFullScreen() {
  const elem = document.documentElement;
  if (elem.requestFullscreen) elem.requestFullscreen();
}

update();
</script>

</body>
</html>
